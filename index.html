<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
	<link rel="stylesheet" href="anim.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
          crossorigin="anonymous">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
	<link rel="icon" type="image/x-icon" href="Immagini/website_icon.png">
    <title>PokeAPI</title>
</head>
<body class="pattern">
<header class="">
    <h1>PokeAPI</h1>
</header>
<main class="d-flex flex-column justify-content-center align-items-center">
	
	<div class="input-group my-3 w-auto">
        <input
        	id="pokemon-search-input"
        	type="text"
        	class="form-control"
        	placeholder="Search for Pokemon"
        	aria-label="Search for Pokemon"
        	aria-describedby="submit-button">
		<div id="suggestions" class="suggestions-list d-none"></div>
        <button
			class="btn btn-primary fa fa-solid fa-magnifying-glass"
			type="submit"
			id="submit-button">
        </button>
    </div>
	
	<div class="card d-none w-auto margin-mobile" id="pokemonDescription" style="max-width: 900px;"> 
		<div class="card-header bg-primary text-white">
			<h5 class="card-title m-0"></h5>
		</div>
    
		<div class="row g-0">
			<div class="col-12 col-md-3 border-responsive"> <!--Prima Colonna -->
				<div class="img-container sprite-container text-center p-3">
					<img src="" id="pokemon-sprite-img" class="img-fluid clickable-pokemon" alt="Pokemon Sprite">
					<div id="sparkle-container"></div>
				</div>
				
				<div class="type-container text-center mb-3"></div>
				
				<div class="card-body">
					<div class="table-responsive">
						<table class="table table-striped table-sm" id="abilityTable">
							<thead>
								<tr>
									<th scope="col">#</th>
									<th scope="col">Ability</th>
									<th scope="col">Hidden</th>
								</tr>
							</thead>
							<tbody></tbody>
						</table>
					</div>
					<div class="accordion" id="gameAppearanceAccordion">
						<div class="accordion-item">
							<h2 class="accordion-header">
								<button
								  class="accordion-button"
								  type="button"
								  data-bs-toggle="collapse"
								  data-bs-target="#collapseOne"
								  aria-expanded="false"
								  aria-controls="collapseOne">

									Games
								</button>
							</h2>
							<div
								id="collapseOne"
								class="accordion-collapse collapse"
								data-bs-parent="#gameAppearanceAccordion">
								<div class="accordion-body">
									<ul class="list-group">
									</ul>
								</div>
							</div>
						</div>
					</div>
				</div>
			</div>
			<div class="col-12 col-md-3 p-3 border-responsive"> <!-- Seconda colonna -->
				<div class="d-flex flex-column justify-content-between" id="pokemonStats">
					<h6 class="fw-bold mb-3">Statistiche di base</h6>
				</div>
				<div id="extraInfo"></div>
				<div id="audioCont">
					<button id="latestBtn" class="btn btn-outline-primary btn-sm rounded-circle ms-2">
						<i class="bi bi-volume-up-fill"></i> 🔊
					</button>
					<button id="legacyBtn" class="btn btn-outline-secondary btn-sm rounded-circle ms-2">
						<i class="bi bi-volume-up-fill"></i> 🔊
					</button>
					<audio id="playCry" src=""></audio>
				</div>
			</div>
			<div class="col-12 col-md-6 bg-light p-3"> <!-- Terza colonna-->
				<div class="d-flex justify-content-between">
					<h5 class="fw-bold" id="evTitle">Catena di evoluzione</h5>
					<button
						class="female-btn fa fa-solid fa-venus d-none"
						type="submit"
						id="genderButton">
					</button>
					<button
						class="btn btn-primary fa fa-solid fa-star"
						type="submit"
						id="shiny-button">
					</button>
				</div>
				<div id="evolutionChain" class="d-flex evolution-wrap">
				</div>
				<div>
					<div class="d-flex m-4 border">
						<p class="fst-italic" id="pokeDescription"></p> 
					</div>
					<button
						class="btn btn-primary fa fa-solid fa-info"
						type="submit"
						id="shiny-button">
					</button>
				</div>
				
			</div>
		</div>
	</div>
</main>

<script src="input.js"></script>
<script src="getPokemonInfo.js"></script>
<script src="func.js"></script>
<script
  src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
  integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
  crossorigin="anonymous"></script>
</body>
</html>
